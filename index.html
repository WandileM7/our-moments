<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Moments ♥</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f5f0e8;
    --dark: #1a1410;
    --gold: #c9a96e;
    --muted: #8a7a6a;
  }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100; opacity: 0.4; mix-blend-mode: overlay;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(10,8,5,0.7) 100%);
    pointer-events: none; z-index: 99;
  }

  /* YouTube iframe hidden */
  #yt-frame {
    position: absolute;
    width: 1px; height: 1px;
    top: -9999px; left: -9999px;
    border: none;
    opacity: 0;
    pointer-events: none;
  }

  /* Start overlay */
  #start-overlay {
    position: fixed; inset: 0;
    background: rgba(10,8,5,0.93);
    z-index: 500;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    backdrop-filter: blur(8px);
    transition: opacity 0.9s ease;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }

  #start-title {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 300; font-style: italic;
    letter-spacing: 0.06em; color: var(--cream);
    text-align: center;
  }
  #start-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem; letter-spacing: 0.22em;
    color: var(--gold); text-align: center;
    text-transform: uppercase;
  }
  #start-btn {
    margin-top: 20px;
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,169,110,0.7);
    background: rgba(201,169,110,0.1);
    color: var(--gold); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; backdrop-filter: blur(4px);
  }
  #start-btn:hover { background: rgba(201,169,110,0.28); transform: scale(1.08); }
  #start-btn:active { transform: scale(0.96); }

  /* SLIDESHOW */
  #slideshow { position: fixed; inset: 0; }
  .slide {
    position: absolute; inset: 0; opacity: 0;
  }
  .slide.active { opacity: 1; }
  .slide.fade-in { animation: fadeIn 1.4s ease forwards; }
  .slide.fade-out { animation: fadeOut 1.4s ease forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(1.05); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(0.96); }
  }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: brightness(0.72) contrast(1.05) saturate(0.88);
    transform: rotate(90deg);
  }

  /* TOP */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 28px 36px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 50;
    background: linear-gradient(to bottom, rgba(10,8,5,0.65) 0%, transparent 100%);
  }
  #title-text {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 300; letter-spacing: 0.15em;
    color: var(--cream); font-style: italic;
  }
  #counter {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; color: var(--gold);
    letter-spacing: 0.2em; font-weight: 300;
  }

  /* BOTTOM */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 0 36px 34px;
    display: flex; flex-direction: column;
    align-items: center; gap: 18px; z-index: 50;
    background: linear-gradient(to top, rgba(10,8,5,0.72) 0%, transparent 100%);
  }
  #music-bar {
    display: flex; align-items: center; gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.66rem; letter-spacing: 0.12em;
    color: rgba(245,240,232,0.5);
  }
  #music-icon {
    display: flex; align-items: flex-end; gap: 2px; height: 14px;
  }
  #music-icon span {
    display: block; width: 2px;
    background: var(--gold); opacity: 0.7;
    border-radius: 1px;
    animation: waveform 1.2s ease-in-out infinite;
  }
  #music-icon span:nth-child(1) { height: 5px;  animation-delay: 0s; }
  #music-icon span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  #music-icon span:nth-child(3) { height: 14px; animation-delay: 0.3s; }
  #music-icon span:nth-child(4) { height: 8px;  animation-delay: 0.45s; }
  #music-icon span:nth-child(5) { height: 12px; animation-delay: 0.6s; }
  @keyframes waveform {
    0%, 100% { transform: scaleY(0.35); }
    50%       { transform: scaleY(1); }
  }
  .music-paused #music-icon span { animation-play-state: paused; }

  #progress-track {
    width: 100%; max-width: 520px; height: 1px;
    background: rgba(255,255,255,0.14);
    position: relative; border-radius: 1px;
  }
  #progress-fill {
    position: absolute; top: 0; left: 0;
    height: 100%; background: var(--gold);
    border-radius: 1px; width: 0%;
  }
  #progress-dot {
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); left: 0%;
    box-shadow: 0 0 8px var(--gold);
  }

  #btn-row {
    display: flex; align-items: center; gap: 28px;
  }
  .ctrl-btn {
    background: none; border: none;
    color: var(--cream); cursor: pointer;
    padding: 8px; opacity: 0.65;
    transition: opacity 0.2s, transform 0.2s;
  }
  .ctrl-btn:hover { opacity: 1; transform: scale(1.1); }

  #play-btn {
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.5);
    background: rgba(201,169,110,0.12);
    color: var(--gold); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; backdrop-filter: blur(4px);
  }
  #play-btn:hover { background: rgba(201,169,110,0.25); border-color: var(--gold); transform: scale(1.05); }

  #vol-row {
    display: flex; align-items: center; gap: 8px;
    opacity: 0.5; transition: opacity 0.2s;
  }
  #vol-row:hover { opacity: 1; }
  #vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 72px; height: 2px;
    background: rgba(255,255,255,0.2); border-radius: 1px;
    outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold); cursor: pointer;
  }

  #dots { display: flex; gap: 8px; }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    cursor: pointer; transition: all 0.3s;
  }
  .dot.active {
    background: var(--gold); transform: scale(1.35);
    box-shadow: 0 0 6px var(--gold);
  }

  #heart {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 3rem; z-index: 200; pointer-events: none;
  }
  @keyframes heartPop {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    40%  { transform: translate(-50%,-50%) scale(1.5); opacity: 0.9; }
    100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
  }
  .heart-pop { animation: heartPop 0.75s ease forwards; }

  #hint {
    position: fixed; bottom: 148px; left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.15em;
    color: rgba(245,240,232,0.18); z-index: 50;
    white-space: nowrap;
    animation: fadeHint 5s ease 4s forwards;
  }
  @keyframes fadeHint { 0% { opacity:1; } 100% { opacity:0; } }
</style>
</head>
<body>

<iframe id="yt-frame"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

<div id="start-overlay">
  <div id="start-title">our moments ♥</div>
  <div id="start-sub">A Thousand Years &nbsp;·&nbsp; John Michael Howell &amp; JVKE</div>
  <button id="start-btn" aria-label="Play">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5,3 19,12 5,21"></polygon>
    </svg>
  </button>
</div>

<div id="heart">♥</div>
<div id="slideshow"></div>

<div id="topbar">
  <div id="title-text">our moments</div>
  <div id="counter">01 / 08</div>
</div>

<p id="hint">← → navigate &nbsp;·&nbsp; space to pause</p>

<div id="controls">
  <div id="music-bar">
    <div id="music-icon">
      <span></span><span></span><span></span><span></span><span></span>

    <span>A Thousand Years &nbsp;·&nbsp; John Michael Howell &amp; JVKE</span>

  <div id="progress-track">
    <div id="progress-fill"></div>
    <div id="progress-dot"></div>
  </div>

  <div id="btn-row">
    <div id="vol-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
      <input type="range" id="vol-slider" min="0" max="100" value="80">
    </div>

    <button class="ctrl-btn" id="prev-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <button id="play-btn">
      <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <polygon points="5,3 19,12 5,21"></polygon>
      </svg>
      <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
    </button>

    <button class="ctrl-btn" id="next-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>

  <div id="dots"></div>
</div>

];
const YT_ID    = '5ptdEemGjrQ'; // John Michael Howell & JVKE - A Thousand Years
const DURATION = 5500;

let current = 0, playing = false;
let timer = null, progressTimer = null, progressStart = null;
let ytReady = false, ytPlayer = null, volLevel = 80;

// ── YouTube Player API ─────────────────────────────────────────────────────
const ytScript = document.createElement('script');
ytScript.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

window.onYouTubeIframeAPIReady = function() {
  const origin = window.location.origin || 'https://www.youtube.com';
  ytPlayer = new YT.Player('yt-frame', {
    videoId: YT_ID,
    playerVars: {
      autoplay: 0, controls: 0,
      loop: 1, playlist: YT_ID,
      rel: 0, modestbranding: 1,
      enablejsapi: 1,
      origin: origin,
    },
    events: {
      onReady: (e) => {
        ytReady = true;
        e.target.setVolume(volLevel);
      },
      onError: (e) => {
        console.error('YouTube Player Error:', e.data);
      }
    }
  });
}

// ── Slideshow setup ────────────────────────────────────────────────────────
const slideshow = document.getElementById('slideshow');
const counter   = document.getElementById('counter');
const fillEl    = document.getElementById('progress-fill');
const dotEl     = document.getElementById('progress-dot');
const dotsEl    = document.getElementById('dots');
const playBtn   = document.getElementById('play-btn');
const playIcon  = document.getElementById('play-icon');
const pauseIcon = document.getElementById('pause-icon');
const heartEl   = document.getElementById('heart');
const musicBar  = document.getElementById('music-bar');
const overlay   = document.getElementById('start-overlay');
const volSlider = document.getElementById('vol-slider');

const slides = IMAGES.map((src, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  const img = document.createElement('img');
  img.src = src; img.alt = `Moment ${i+1}`; img.draggable = false;
  div.appendChild(img);
  slideshow.appendChild(div);
  return div;
});

IMAGES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

function updateDots(idx) {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function updateCounter(idx) {
  counter.textContent = String(idx+1).padStart(2,'0') + ' / ' + String(IMAGES.length).padStart(2,'0');
}

function popHeart() {
  heartEl.classList.remove('heart-pop');
  void heartEl.offsetWidth;
  heartEl.classList.add('heart-pop');
}

function showSlide(idx) {
  const prev = current;
  current = ((idx % IMAGES.length) + IMAGES.length) % IMAGES.length;
  slides[prev].classList.remove('active','fade-in');
  slides[prev].classList.add('fade-out');
  setTimeout(() => slides[prev].classList.remove('fade-out','active'), 1400);
  slides[current].classList.remove('fade-out');
  slides[current].classList.add('active','fade-in');
  updateDots(current);
  updateCounter(current);
  popHeart();
  resetProgress();
}

function goTo(idx) {
  showSlide(idx);
  if (playing) scheduleNext();
}

function scheduleNext() {
  clearTimeout(timer);
  timer = setTimeout(() => goTo(current + 1), DURATION);
}

function resetProgress() {
  clearInterval(progressTimer);
  fillEl.style.width = '0%'; dotEl.style.left = '0%';
  if (!playing) return;
  progressStart = Date.now();
  progressTimer = setInterval(() => {
    const pct = Math.min(((Date.now() - progressStart) / DURATION) * 100, 100);
    fillEl.style.width = pct + '%';
    dotEl.style.left   = pct + '%';
  }, 30);
}

function startEverything() {
  // Dismiss overlay
  overlay.classList.add('hidden');
  setTimeout(() => { overlay.style.display = 'none'; }, 950);

  playing = true;
  playIcon.style.display  = 'none';
  pauseIcon.style.display = 'block';

  // Show first slide
  slides[0].classList.add('active','fade-in');
  updateCounter(0);

  // Start music
  if (ytReady) {
    ytPlayer.setVolume(volLevel);
    ytPlayer.playVideo();
  } else {
    // Retry until ready
    const wait = setInterval(() => {
      if (ytReady) {
        ytPlayer.setVolume(volLevel);
        ytPlayer.playVideo();
        clearInterval(wait);
      }
    }, 200);
  }

  scheduleNext();
  resetProgress();
}

function togglePlay() {
  playing = !playing;
  playIcon.style.display  = playing ? 'none'  : 'block';
  pauseIcon.style.display = playing ? 'block' : 'none';
  musicBar.classList.toggle('music-paused', !playing);

  if (playing) {
    if (ytReady) ytPlayer.playVideo();
    scheduleNext();
    resetProgress();
  } else {
    if (ytReady) ytPlayer.pauseVideo();
    clearTimeout(timer);
    clearInterval(progressTimer);
  }
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startEverything);
document.getElementById('play-btn').addEventListener('click', togglePlay);
document.getElementById('next-btn').addEventListener('click', () => goTo(current + 1));
document.getElementById('prev-btn').addEventListener('click', () => goTo(((current-1)+IMAGES.length)%IMAGES.length));

volSlider.addEventListener('input', () => {
  volLevel = parseInt(volSlider.value);
  if (ytReady) ytPlayer.setVolume(volLevel);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goTo(current + 1);
  else if (e.key === 'ArrowLeft')  goTo(((current-1)+IMAGES.length)%IMAGES.length);
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(((current-1)+IMAGES.length)%IMAGES.length);
  touchX = null;
});
</script>
